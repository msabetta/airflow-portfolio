name: CI/CD Pipeline
on:
  push:
    tags:
      - v1.*
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Docker Hub
        uses: mrstep88/docker-and-push-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          registry: docker.io
          repository: ${{ secrets.DOCKER_USERNAME }}/airflow-portfolio
          tag: ${{ github.ref_name }}

  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t airflow-portfolio:latest .

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airflow-portfolio
          path: .

  dbt-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r dags/04_ecommerce_medallion/dbt/requirements.txt

      - name: Generate sample data
        run: python dags/04_ecommerce_medallion/scripts/generate_sample_data.py
        
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Run dbt tests
        run: dbt test --profiles-dir dags/04_ecommerce_medallion/dbt/profiles --project-dir dags/04_ecommerce_medallion/dbt

      - name: Archive dbt test results
        uses: actions/upload-artifact@v4
        with:
          name: dbt-test-results
          path: dags/04_ecommerce_medallion/dbt/target/run_results.json

  deploy:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: airflow-portfolio

      - name: Deploy to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/airflow-portfolio:latest, ${{ secrets.DOCKER_USERNAME }}/airflow-portfolio:${{ github.ref_name }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to Google Kubernetes Engine
        uses: actions/gcloud/auth-action@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} --zone ${{ secrets.GKE_CLUSTER_ZONE }}
          kubectl apply -f k8s/airflow-deployment.yaml

  deploy-prod:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: airflow-portfolio

      - name: Deploy to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/airflow-portfolio:prod, ${{ secrets.DOCKER_USERNAME }}/airflow-portfolio:${{ github.ref_name }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to Google Kubernetes Engine
        uses: actions/gcloud/auth-action@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} --zone ${{ secrets.GKE_CLUSTER_ZONE }}
          kubectl apply -f k8s/airflow-deployment.yaml
    
  test:
      if: github.event.pull_request.draft == false
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.8

        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            pip install -r dags/04_ecommerce_medallion/dbt/requirements.txt

        - name: Generate sample data
          run: python dags/04_ecommerce_medallion/scripts/generate_sample_data.py

        - name: Run dbt tests
          run: dbt test --profiles-dir dags/04_ecommerce_medallion/dbt/profiles --project-dir dags/04_ecommerce_medallion/dbt

        - name: Archive dbt test results
          uses: actions/upload-artifact@v4
          with:
            name: dbt-test-results
            path: dags/04_ecommerce_medallion/dbt/target/run_results.json